<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prime Groove Construction — Project Command Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#0B1E3F; --navy2:#16305C; --navy3:#20406E;
    --gold:#C6A15B; --goldSoft:#EFE4CC; --orange:#DB7B34;
    --ink:#1B2434; --muted:#8A8578; --faint:#B4AFA3;
    --bg:#F4F2EC; --card:#FFFFFF; --line:#E7E2D7;
    --green:#2F7D5B; --greenSoft:#E2F0E8; --amber:#C6890F; --amberSoft:#F6ECCF;
    --red:#B4472E; --redSoft:#F3E0DA;
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#D6D0C4;border-radius:9px}
  button{font-family:var(--sans)}
  input,textarea,select{font-family:var(--sans)}
  input:focus,textarea:focus,select:focus{border-color:var(--gold)!important}

  .app{display:flex;min-height:100vh}
  /* sidebar */
  .sidebar{width:250px;background:var(--navy);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;transition:transform .28s ease}
  .menubtn{display:none;background:none;border:none;cursor:pointer;padding:6px;margin-right:12px;flex-shrink:0}
  .menubtn span{display:block;width:22px;height:2px;background:var(--navy);margin:5px 0;border-radius:2px}
  .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(11,30,63,.45);z-index:19}
  .sidebar-close{display:none}
  .brand{padding:26px 22px 20px;display:flex;align-items:center;gap:11px}
  .brand .logo{width:40px;height:40px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:20px;font-weight:600;color:var(--navy)}
  .brand .name{font-family:var(--serif);font-size:16px;color:#fff;font-weight:500;line-height:1.1}
  .brand .sub{font-size:10.5px;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
  nav{padding:8px 14px;flex:1}
  .navbtn{width:100%;display:flex;align-items:center;gap:12px;padding:11px 14px;margin-bottom:4px;border-radius:10px;border:none;cursor:pointer;background:transparent;color:#9AA6BC;font-size:13.5px;font-weight:600;text-align:left;transition:all .18s;position:relative}
  .navbtn:hover{color:#fff;background:rgba(255,255,255,.05)}
  .navbtn.active{background:var(--navy2);color:#fff}
  .navbtn.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--gold);border-radius:3px}
  .navbtn svg{width:17px;height:17px;stroke:#7382A0}
  .navbtn.active svg{stroke:var(--gold)}
  .tagfoot{padding:18px 22px;border-top:1px solid var(--navy2)}
  .tagfoot .t{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--gold);line-height:1.4}
  .tagfoot .l{font-size:10.5px;color:#5D6B85;margin-top:8px}

  /* main */
  main{flex:1;min-width:0}
  header.top{background:var(--card);border-bottom:1px solid var(--line);padding:20px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
  .crumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--faint);margin-bottom:3px}
  header.top h1{font-family:var(--serif);font-size:24px;font-weight:500;color:var(--navy);margin:0}
  .date .d{font-size:13px;font-weight:600;color:var(--ink)}
  .date .s{font-size:12px;color:var(--muted);text-align:right}
  .wrap{padding:32px;max-width:1240px;margin:0 auto}

  /* primitives */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:0 1px 2px rgba(11,30,63,.04)}
  .grid{display:grid;gap:16px}
  .stat{padding:20px;position:relative;overflow:hidden}
  .stat .accent{position:absolute;top:0;left:0;width:4px;height:100%}
  .stat .row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
  .stat .lab{font-size:12.5px;font-weight:600;color:var(--muted);max-width:150px;line-height:1.3}
  .stat .ico{width:34px;height:34px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center}
  .stat .ico svg{width:17px;height:17px;stroke:var(--navy2)}
  .stat .val{font-family:var(--serif);font-size:32px;font-weight:500;color:var(--navy);line-height:1}
  .stat .subv{font-size:12px;color:var(--faint);margin-top:8px}

  .seclab{display:flex;align-items:center;gap:8px;margin-bottom:16px}
  .seclab svg{width:16px;height:16px;stroke:var(--gold)}
  .seclab span{font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}

  .badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;letter-spacing:.2px;white-space:nowrap;display:inline-block}
  .b-ontrack{background:var(--greenSoft);color:var(--green)}
  .b-delayed{background:var(--amberSoft);color:var(--amber)}
  .b-completed{background:var(--goldSoft);color:#8A6D2A}

  .prog{background:#ECE8DE;border-radius:999px;height:8px;overflow:hidden;width:100%}
  .prog>i{display:block;height:100%;border-radius:999px;transition:width .5s ease}

  .filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .fbtn{font-size:13px;font-weight:600;padding:8px 16px;border-radius:999px;border:1px solid var(--line);cursor:pointer;background:var(--card);color:var(--muted);transition:all .2s}
  .fbtn.on{background:var(--navy);color:#fff;border-color:var(--navy)}

  .pcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s ease;box-shadow:0 1px 2px rgba(11,30,63,.04)}
  .pcard:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(11,30,63,.10)}
  .pcard .strip{height:6px}
  .pcard .body{padding:20px}
  .prow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
  .pname{font-family:var(--serif);font-size:18px;color:var(--navy);line-height:1.2;font-weight:500}
  .metaline{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);margin-bottom:4px}
  .metaline svg{width:13px;height:13px;stroke:var(--gold)}
  .kv2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
  .kv .kl{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--faint)}
  .kv .kvv{font-family:var(--serif);font-size:16px;color:var(--navy)}
  .kv .kvt{font-size:12.5px;color:var(--ink);font-weight:500}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700;padding:0 12px 12px}
  td{padding:12px;font-size:12.5px;color:var(--muted)}
  tr+tr td,tbody tr{border-top:1px solid var(--line)}
  .tblwrap{overflow-x:auto}

  input,textarea,select{width:100%;font-size:13.5px;color:var(--ink);padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--bg);outline:none}
  textarea{resize:vertical}
  label.fl{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
  .field{margin-bottom:14px}
  .submit{width:100%;font-size:14px;font-weight:700;color:#fff;background:var(--navy);border:none;border-radius:10px;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
  .okmsg{margin-top:12px;font-size:13px;font-weight:600;color:var(--green);background:var(--greenSoft);padding:10px 14px;border-radius:9px;display:flex;align-items:center;gap:8px}

  .backbtn{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);padding:0;width:fit-content}
  .backbtn svg{width:16px;height:16px;stroke:var(--muted)}

  .cols{display:grid;gap:22px}
  @media(max-width:900px){
    .cols,.grid{grid-template-columns:1fr!important}
    .menubtn{display:block}
    .sidebar{position:fixed;top:0;left:0;z-index:20;transform:translateX(-100%);box-shadow:0 0 40px rgba(0,0,0,.25)}
    .sidebar.open{transform:translateX(0)}
    .sidebar-backdrop.open{display:block}
    .sidebar-close{display:block;position:absolute;top:18px;right:16px;background:none;border:none;cursor:pointer;padding:6px}
    .sidebar-close span{display:block;width:18px;height:2px;background:#9AA6BC;border-radius:2px}
    .sidebar-close span:first-child{transform:rotate(45deg) translate(3px,4px)}
    .sidebar-close span:last-child{transform:rotate(-45deg) translate(3px,-4px)}
  }

  .avatar{width:38px;height:38px;border-radius:999px;background:var(--navy);color:var(--gold);font-family:var(--serif);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .taskchip{cursor:pointer;border:none;font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:999px}
  .chip-todo{background:var(--bg);color:var(--muted)}
  .chip-prog{background:var(--goldSoft);color:#8A6D2A}
  .chip-done{background:var(--greenSoft);color:var(--green)}
  .pill{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12.5px}
  .pill b{color:var(--faint);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar-backdrop" id="backdrop" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="closeSidebar()"><span></span><span></span></button>
    <div class="brand">
      <div class="logo">P</div>
      <div>
        <div class="name">Prime Groove</div>
        <div class="sub">Construction Ltd</div>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="tagfoot">
      <div class="t">Excellence in<br/>Every Detail.</div>
      <div class="l">Jahi, Abuja · Kano</div>
    </div>
  </aside>
  <main>
    <header class="top">
      <div style="display:flex;align-items:center">
        <button class="menubtn" onclick="openSidebar()"><span></span><span></span><span></span></button>
        <div>
          <div class="crumb" id="crumb"><span>Dashboard</span></div>
          <h1 id="title">Overview Dashboard</h1>
        </div>
      </div>
      <div class="date">
        <div class="d" id="today"></div>
        <div class="s">Project Command Centre</div>
      </div>
    </header>
    <div class="wrap" id="view"></div>
  </main>
</div>

<script>
/* ============================ ICONS ============================ */
const I = {

  chev:'<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>',
};
function icon(name,stroke){return I[name]?I[name].replace('<svg','<svg style="stroke:'+(stroke||'currentColor')+'"'):''}

/* ============================ HELPERS ============================ */
const nairaM = n => '₦'+Number(n).toLocaleString('en-NG',{maximumFractionDigits:1})+'M';
const naira  = n => '₦'+Number(n).toLocaleString('en-NG');
function statusClass(s){return s==='On Track'?'b-ontrack':s==='Delayed'?'b-delayed':'b-completed'}
function statusColor(s){return s==='On Track'?'var(--green)':s==='Delayed'?'var(--amber)':'var(--gold)'}
function badge(s){return '<span class="badge '+statusClass(s)+'">'+s+'</span>'}
function progressBar(v,h){h=h||8;const c=v>=100?'var(--gold)':v<50?'var(--orange)':'var(--navy2)';
  return '<div class="prog" style="height:'+h+'px"><i style="width:'+v+'%;background:'+c+'"></i></div>'}
function seclab(ic,txt){return '<div class="seclab">'+icon(ic,'var(--gold)')+'<span>'+txt+'</span></div>'}
function stat(ic,val,lab,sub,acc){
  return '<div class="card stat"><div class="accent" style="background:'+(acc||'var(--gold)')+'"></div>'+
    '<div class="row"><span class="lab">'+lab+'</span><span class="ico">'+icon(ic,'var(--navy2)')+'</span></div>'+
    '<div class="val">'+val+'</div>'+(sub?'<div class="subv">'+sub+'</div>':'')+'</div>'}

/* ============================ DATA ============================ */

/* ============================ CHARTS (SVG) ============================ */
function areaChart(data,color){
  const W=600,H=240,pl=42,pr=14,pt=12,pb=28,pw=W-pl-pr,ph=H-pt-pb;
  const max=Math.max.apply(null,data.map(d=>d.s))*1.15;
  const x=i=>pl+(data.length===1?pw/2:i*pw/(data.length-1));
  const y=v=>pt+ph*(1-v/max);
  let grid='',yl='';for(let g=0;g<=4;g++){const gy=pt+ph*g/4;const gv=Math.round(max*(1-g/4));
    grid+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="var(--line)"/>';
    yl+='<text x="'+(pl-8)+'" y="'+(gy+3)+'" text-anchor="end" font-size="10" fill="var(--muted)" font-family="var(--sans)">'+gv+'</text>'}
  let line='',pts=data.map((d,i)=>x(i)+','+y(d.s));
  line='M'+pts.join(' L');
  const area=line+' L'+x(data.length-1)+','+(pt+ph)+' L'+x(0)+','+(pt+ph)+' Z';
  let dots='',xl='';data.forEach((d,i)=>{dots+='<circle cx="'+x(i)+'" cy="'+y(d.s)+'" r="3" fill="var(--navy)"/>';
    xl+='<text x="'+x(i)+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="var(--muted)" font-family="var(--sans)">'+d.m+'</text>'});
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="'+color+'" stop-opacity="0.35"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0.02"/></linearGradient></defs>'+
    grid+yl+'<path d="'+area+'" fill="url(#ag)"/><path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="2.5"/>'+dots+xl+'</svg>'}

function lineChart(data,color){
  const W=600,H=240,pl=42,pr=14,pt=12,pb=28,pw=W-pl-pr,ph=H-pt-pb;
  const max=Math.max.apply(null,data.map(d=>d.v))*1.1;
  const x=i=>pl+i*pw/(data.length-1),y=v=>pt+ph*(1-v/max);
  let grid='',yl='';for(let g=0;g<=4;g++){const gy=pt+ph*g/4;const gv=Math.round(max*(1-g/4));
    grid+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="var(--line)"/>';
    yl+='<text x="'+(pl-8)+'" y="'+(gy+3)+'" text-anchor="end" font-size="10" fill="var(--muted)" font-family="var(--sans)">'+gv+'</text>'}
  const line='M'+data.map((d,i)=>x(i)+','+y(d.v)).join(' L');
  let dots='',xl='';data.forEach((d,i)=>{dots+='<circle cx="'+x(i)+'" cy="'+y(d.v)+'" r="3" fill="var(--gold)"/>';
    xl+='<text x="'+x(i)+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="var(--muted)" font-family="var(--sans)">'+d.m+'</text>'});
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto">'+grid+yl+'<path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="3"/>'+dots+xl+'</svg>'}

function groupedBar(data){
  const W=600,H=260,pl=36,pr=14,pt=12,pb=34,pw=W-pl-pr,ph=H-pt-pb;
  const max=Math.max.apply(null,data.map(d=>Math.max(d.budget,d.spent)))*1.15;
  const y=v=>pt+ph*(1-v/max),h=v=>ph*v/max;
  const slot=pw/data.length,bw=16;
  let grid='';for(let g=0;g<=4;g++){const gy=pt+ph*g/4;grid+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="var(--line)"/>'}
  let bars='',xl='';data.forEach((d,i)=>{const cx=pl+slot*i+slot/2;
    bars+='<rect x="'+(cx-bw-2)+'" y="'+y(d.budget)+'" width="'+bw+'" height="'+h(d.budget)+'" rx="4" fill="var(--navy2)"/>';
    bars+='<rect x="'+(cx+2)+'" y="'+y(d.spent)+'" width="'+bw+'" height="'+h(d.spent)+'" rx="4" fill="var(--gold)"/>';
    xl+='<text x="'+cx+'" y="'+(H-14)+'" text-anchor="middle" font-size="10" fill="var(--ink)" font-family="var(--sans)">'+d.name+'</text>'});
  const legend='<g font-family="var(--sans)" font-size="11"><circle cx="'+(pl)+'" cy="'+(H-2)+'" r="4" fill="var(--navy2)"/><text x="'+(pl+9)+'" y="'+(H+1)+'" fill="var(--muted)">Budget</text>'+
    '<circle cx="'+(pl+80)+'" cy="'+(H-2)+'" r="4" fill="var(--gold)"/><text x="'+(pl+89)+'" y="'+(H+1)+'" fill="var(--muted)">Spent</text></g>';
  return '<svg viewBox="0 0 '+W+' '+(H+6)+'" style="width:100%;height:auto">'+grid+bars+xl+legend+'</svg>'}

function varianceChart(data){
  const W=600,H=240,pl=36,pr=14,pt=12,pb=40,pw=W-pl-pr,ph=H-pt-pb;
  const max=Math.max.apply(null,data.map(d=>Math.abs(d.v)))*1.2||1;
  const zero=pt+ph/2,scale=(ph/2)/max;
  const slot=pw/data.length,bw=20;
  let bars='',xl='';data.forEach((d,i)=>{const cx=pl+slot*i+slot/2;const bh=Math.abs(d.v)*scale;
    const yTop=d.v>=0?zero-bh:zero;
    bars+='<rect x="'+(cx-bw/2)+'" y="'+yTop+'" width="'+bw+'" height="'+Math.max(bh,1)+'" rx="3" fill="'+(d.v>=0?'var(--green)':'var(--red)')+'"/>';
    xl+='<text x="'+cx+'" y="'+(H-8)+'" text-anchor="middle" font-size="9.5" fill="var(--ink)" font-family="var(--sans)">'+d.name+'</text>'});
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto"><line x1="'+pl+'" y1="'+zero+'" x2="'+(W-pr)+'" y2="'+zero+'" stroke="var(--faint)" stroke-dasharray="3 3"/>'+bars+xl+'</svg>'}

    TEAM.filter(m=>m.dept===d).map(m=>'<div style="display:flex;align-items:center;gap:12px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px">'+
    '<div class="avatar">'+m.initials+'</div><div><div style="font-size:13px;font-weight:600;color:var(--ink);line-height:1.2">'+m.name+'</div>'+
    '<div style="font-size:11.5px;color:var(--muted)">'+m.role+'</div></div></div>').join('')+'</div></div>').join('')+'</div>';
  const chipClass=s=>s==='Done'?'chip-done':s==='In Progress'?'chip-prog':'chip-todo';
  const tasks='<div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center">'+seclab('clip','Assigned tasks')+
    '<span style="font-size:12px;color:var(--faint);margin-bottom:16px">Tap a status to advance it</span></div>'+
    '<div class="tblwrap"><table style="min-width:640px"><thead><tr>'+
    ['Task','Assigned to','Project','Due','Status'].map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+
    TASKS.map((t,i)=>'<tr><td style="color:var(--ink);font-weight:600">'+t.name+'</td><td>'+t.assignee+'</td><td>'+t.project+'</td><td>'+t.due+'</td>'+
    '<td><button class="taskchip '+chipClass(t.status)+'" onclick="cycleTask('+i+')">'+t.status+'</button></td></tr>').join('')+
    '</tbody></table></div></div>';
  return dir+tasks;
}
function cycleTask(i){const order=['To Do','In Progress','Done'];
  TASKS[i].status=order[(order.indexOf(TASKS[i].status)+1)%3];render()}

/* ============================ ROUTER ============================ */
const NAV=[
  {id:'overview',label:'Overview',icon:'dash',title:'Overview Dashboard'},
  {id:'projects',label:'Projects',icon:'building',title:'Projects'},
  {id:'reports',label:'Site Reports',icon:'file',title:'Site Reports'},
  {id:'finance',label:'Finance',icon:'wallet',title:'Finance'},
  {id:'team',label:'Team & Tasks',icon:'users',title:'Team & Tasks'},
];
let state={view:'overview',projId:null};
function go(v){state.view=v;state.projId=null;render();closeSidebar()}
function openProject(id){state.projId=id;render();closeSidebar()}
function backToProjects(){state.projId=null;render()}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('backdrop').classList.add('open');document.body.style.overflow='hidden'}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('backdrop').classList.remove('open');document.body.style.overflow=''}

function render(){
  // nav
  document.getElementById('nav').innerHTML=NAV.map(n=>
    '<button class="navbtn '+(state.view===n.id?'active':'')+'" onclick="go(\''+n.id+'\')">'+icon(n.icon)+n.label+'</button>').join('');
  // header
  const cur=NAV.find(n=>n.id===state.view);
  const inDetail=state.view==='projects'&&state.projId;
  document.getElementById('title').textContent=inDetail?'Project Detail':cur.title;
  document.getElementById('crumb').innerHTML='<span>Dashboard</span>'+(inDetail?'<span style="width:13px;height:13px;display:inline-block">'+icon('chev','var(--faint)')+'</span><span>Project</span>':'');
  // body
  let html='';
  if(state.view==='overview')html=vOverview();
  else if(state.view==='projects')html=state.projId?vProjectDetail(state.projId):vProjects();
  else if(state.view==='reports')html=vReports();
  else if(state.view==='finance')html=vFinance();
  else if(state.view==='team')html=vTeam();
  document.getElementById('view').innerHTML=html;
  window.scrollTo(0,0);
}
document.getElementById('today').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
render();
</script>
